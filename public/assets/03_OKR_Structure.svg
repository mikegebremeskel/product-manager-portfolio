<svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ao" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="580" fill="#ffffff"/>

  <text x="460" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">What makes a goal a goal</text>
  <text x="460" y="66" text-anchor="middle" font-size="14" fill="#475569">Read any goal and ask, "so what?" If nothing changes when you hit it, it was a task</text>

  <!-- Objective -->
  <rect x="210" y="96" width="500" height="74" rx="10" fill="#0f766e"/>
  <text x="460" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Objective = what + why</text>
  <text x="460" y="146" text-anchor="middle" font-size="12.5" fill="#bbf7d0">"Understand what outreach resonates with customers as we launch"</text>
  <text x="460" y="161" text-anchor="middle" font-size="11.5" fill="#99f6e4">aspirational, can last more than a week</text>

  <line x1="320" y1="170" x2="250" y2="206" stroke="#475569" stroke-width="2.5" marker-end="url(#ao)"/>
  <line x1="460" y1="170" x2="460" y2="206" stroke="#475569" stroke-width="2.5" marker-end="url(#ao)"/>
  <line x1="600" y1="170" x2="670" y2="206" stroke="#475569" stroke-width="2.5" marker-end="url(#ao)"/>

  <!-- Key results -->
  <g>
    <rect x="80" y="210" width="240" height="70" rx="8" fill="#2563eb"/>
    <text x="200" y="236" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Key result</text>
    <text x="200" y="256" text-anchor="middle" font-size="11.5" fill="#dbeafe">Bring 20 users into the beta</text>
    <text x="200" y="271" text-anchor="middle" font-size="11" fill="#bfdbfe">what + when, measurable</text>

    <rect x="340" y="210" width="240" height="70" rx="8" fill="#2563eb"/>
    <text x="460" y="236" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Key result</text>
    <text x="460" y="256" text-anchor="middle" font-size="11.5" fill="#dbeafe">5 net-new meetings by Friday</text>
    <text x="460" y="271" text-anchor="middle" font-size="11" fill="#bfdbfe">what + when, measurable</text>

    <rect x="600" y="210" width="240" height="70" rx="8" fill="#2563eb"/>
    <text x="720" y="236" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Key result</text>
    <text x="720" y="256" text-anchor="middle" font-size="11.5" fill="#dbeafe">Onboard 3 new customers</text>
    <text x="720" y="271" text-anchor="middle" font-size="11" fill="#bfdbfe">what + when, measurable</text>
  </g>

  <text x="460" y="312" text-anchor="middle" font-size="12.5" fill="#334155">Every key result is something you can check. You either hit it or you do not.</text>

  <!-- before / after -->
  <text x="460" y="354" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">The test in practice</text>

  <rect x="120" y="370" width="320" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="280" y="394" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">Task, not a goal</text>
  <text x="280" y="416" text-anchor="middle" font-size="12.5" fill="#7f1d1d">"Complete the outreach messaging"</text>
  <text x="280" y="432" text-anchor="middle" font-size="11" fill="#b91c1c">finishing it tells you nothing</text>

  <line x1="448" y1="405" x2="478" y2="405" stroke="#475569" stroke-width="2.5" marker-end="url(#ao)"/>

  <rect x="486" y="370" width="320" height="70" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="646" y="394" text-anchor="middle" font-size="12.5" font-weight="700" fill="#15803d">Real goal</text>
  <text x="646" y="416" text-anchor="middle" font-size="12.5" fill="#14532d">"Understand what outreach resonates"</text>
  <text x="646" y="432" text-anchor="middle" font-size="11" fill="#15803d">now it points at something</text>

  <!-- takeaway -->
  <rect x="120" y="470" width="686" height="56" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="463" y="494" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">The objective carries the why. The key result carries the when and the number.</text>
  <text x="463" y="514" text-anchor="middle" font-size="12.5" fill="#475569">If you cannot answer "so what?", it was never a goal.</text>
  <text x="460" y="566" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">Framework: Objectives and Key Results (Andy Grove, John Doerr). Best practice: key results are measurable outcomes, not tasks. Example values: Mike's own Talisman OKRs.</text>
</svg>
