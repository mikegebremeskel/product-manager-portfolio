<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  .card {
    width: 1200px; height: 630px;
    background: #FBFBFD;
    font-family: 'Inter', sans-serif;
    padding: 72px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  /* soft neutral bloom, top-right (monochrome to match the icon) */
  .glow {
    position: absolute; top: -200px; right: -160px;
    width: 620px; height: 620px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,0,0,0.06), rgba(0,0,0,0) 70%);
  }
  .mono {
    width: 76px; height: 76px; border-radius: 18px;
    background: #1D1D1F; color: #FFFFFF;
    font-weight: 700; font-size: 38px; letter-spacing: -1px;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  .mid { position: relative; z-index: 1; }
  h1 {
    color: #1D1D1F; font-size: 88px; font-weight: 600;
    line-height: 1.05; letter-spacing: -3px;
  }
  .sub { margin-top: 20px; color: #6E6E73; font-size: 32px; font-weight: 500; }
  .proof { margin-top: 10px; color: #1D1D1F; font-size: 32px; font-weight: 500; }
  .bottom {
    position: relative; z-index: 1;
    border-top: 1px solid rgba(0,0,0,0.08); padding-top: 28px;
  }
  .url { color: #6E6E73; font-size: 26px; font-weight: 500; }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="mono">MG</div>
    <div class="mid">
      <h1>Mike Gebremeskel</h1>
      <div class="sub">Product manager of an award-winning B2B SaaS startup</div>
    </div>
    <div class="bottom">
      <span class="url">mikegebremeskel.com</span>
    </div>
  </div>
</body>
</html>
