<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  .card {
    width: 1200px; height: 630px;
    background: #FBFBFD;
    font-family: 'Inter', sans-serif;
    padding: 72px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  /* soft brand glow, top-right (the signature accent bloom) */
  .glow {
    position: absolute; top: -200px; right: -160px;
    width: 620px; height: 620px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,113,227,0.30), rgba(0,113,227,0) 70%);
  }
  .mono {
    width: 76px; height: 76px; border-radius: 18px;
    background: #0066CC; color: #FFFFFF;
    font-weight: 700; font-size: 38px; letter-spacing: -1px;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  .mid { position: relative; z-index: 1; }
  .eyebrow {
    color: #6E6E73; font-size: 22px; font-weight: 600;
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 22px;
  }
  h1 {
    color: #1D1D1F; font-size: 72px; font-weight: 600;
    line-height: 1.08; letter-spacing: -2px; max-width: 1010px;
  }
  h1 .dot { color: #0071E3; }
  .bottom {
    display: flex; align-items: baseline; justify-content: space-between;
    position: relative; z-index: 1;
    border-top: 1px solid rgba(0,0,0,0.08); padding-top: 28px;
  }
  .name { color: #0058B9; font-size: 30px; font-weight: 600; }
  .url { color: #6E6E73; font-size: 26px; font-weight: 500; }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="mono">MG</div>
    <div class="mid">
      <div class="eyebrow">Product Manager</div>
      <h1>I empathize with users to build intuitive products<span class="dot">.</span></h1>
    </div>
    <div class="bottom">
      <span class="name">Mike Gebremeskel</span>
      <span class="url">mikegebremeskel.com</span>
    </div>
  </div>
</body>
</html>
